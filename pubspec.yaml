name: aqarai_app
description: "AqarAi App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  cloud_functions: ^6.0.5
  firebase_messaging: ^16.1.0
  firebase_storage: ^13.0.5

  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  share_plus: ^12.0.1
  device_info_plus: ^12.3.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

  # 🔥 لتحميل الصور بسرعة + كاش + منع التعليق
  cached_network_image: ^3.3.1

  http: ^1.2.2
  flag: ^7.0.2
  shared_preferences: ^2.5.3
  fl_chart: ^0.70.2
  ntp: ^2.0.0
  table_calendar: ^3.1.3
  webview_flutter_wkwebview: ^3.24.2
  webview_flutter_android: ^4.10.15

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/aqarai_logo_transparent.png
    - assets/images/aqarai_chat_logo.png
    - assets/images/kuwait_bridge_bg.png

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png

flutter_native_splash:
  # Matches the solid background inside the logo PNG (avoids visible square on splash).
  color: "#010026"
  image: assets/images/aqarai_logo_transparent.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
